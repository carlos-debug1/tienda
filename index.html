<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tienda PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:url("fondo.jpg") center/cover fixed;
}

.main{
max-width:1100px;
margin:auto;
padding:40px;
margin-top:20vh;
}

/* PRODUCTOS */

.container{
display:flex;
flex-wrap:wrap;
gap:25px;
justify-content:center;
}

.card{
width:280px;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
position:relative;
}

/* GALERIA */

.galeria{
display:flex;
overflow-x:auto;
scroll-snap-type:x mandatory;
}

.galeria img{
width:100%;
height:200px;
object-fit:cover;
flex-shrink:0;
scroll-snap-align:center;
cursor:pointer;
}

/* INDICADORES */

.indicadores{
position:absolute;
bottom:2px; /* 👈 ahora sí queda en la base de la imagen */
width:100%;
text-align:center;
pointer-events:none;
}

.indicadores span{
display:inline-block;
width:8px;
height:8px;
margin:3px;
background:white;
border-radius:50%;
opacity:0.5;
}

.indicadores span.activo{
opacity:1;
}

/* ICONO SWIPE */

.swipeIcon{
position:absolute;
top:10px;
right:10px;
background:rgba(0,0,0,0.5);
color:white;
padding:4px 8px;
border-radius:10px;
font-size:12px;
}

/* CANTIDAD */

.qty{
display:flex;
justify-content:center;
gap:10px;
margin:10px;
}

.qty button{
background:black;
color:white;
border:none;
padding:6px 12px;
cursor:pointer;
}

.qty input{
width:50px;
text-align:center;
}

/* BOTON */
.add{
background:black;
color:white;
border:none;
padding:10px;
width:90%;
margin:20px 10px 10px 10px; /* 👈 más espacio arriba */
cursor:pointer;
}
.card{
padding-bottom:10px;
}
/* FORMULARIO */
.formulario input{
border-radius:8px;
padding:12px;
border:1px solid #ccc;
}
.formulario{
margin:60px auto;
max-width:400px;
background:rgba(255,255,255,0.7);
padding:25px;
border-radius:12px;
color:black;
text-align:center; /* 👈 centra contenido */
display:flex;
flex-direction:column;
gap:10px;
}

/* CARRITO */

.carritoPanel{
position:fixed;
right:-400px;
top:0;
width:350px;
height:100%;
background:white;
padding:20px;
transition:.4s;
overflow:auto;
}

.carritoPanel.activo{
right:0;
}

.botonCarrito{
position:fixed;
bottom:20px;
right:20px;
background:black;
color:white;
padding:15px;
border:none;
border-radius:30px;
}

/* BOTONES FLOTANTES */

.floating{
position:fixed;
left:20px;
bottom:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.floating a{
width:50px;
height:50px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
color:white;
font-size:20px;
text-decoration:none;
}

.wa{background:#25D366;}
.fb{background:#1877f2;}
.ig{background:#E1306C;}
.top{background:black;}

/* ZOOM */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:999;
}

.modal img{
max-width:90%;
}

</style>

</head>

<body>

<div class="main">

<div class="container" id="productos"></div>

<div class="formulario">

<h3>Datos del cliente</h3>

<input id="nombre" placeholder="Nombre"><br>
<input id="apellido" placeholder="Apellido"><br>

<label>Fecha del evento</label><br>
<input type="date" id="fecha"><br>
<label>Temática o personaje</label>
<input id="tematica" placeholder="Ej: Spiderman, Princesas...">

<select id="entrega" onchange="cambiarEntrega()">
<option value="">Entrega</option>
<option value="Retiro">Retiro</option>
<option value="Envio">Envío</option>
</select><br>

<input id="direccion" placeholder="Dirección de envío">

<div id="retiroLink" style="display:none;margin-top:10px">
<a href="https://maps.app.goo.gl/wgjL3WFK9cv3dm3N9?g_st=ac" target="_blank">
Ver ubicación de retiro
</a>
</div>

</div>

</div>

<button class="botonCarrito" onclick="abrirCarrito()">
🛒 <span id="contador">0</span>
</button>

<div class="carritoPanel" id="carrito">

<button onclick="cerrarCarrito()">Cerrar</button>

<h2>Resumen</h2>

<div id="datosCliente"></div>

<ul id="lista"></ul>

<div id="total"></div>

<button onclick="enviarWhats()">Enviar pedido</button>

</div>

<!-- BOTONES -->

<div class="floating">

<a href="https://wa.me/5493815441312" target="_blank" class="wa">
<i class="fab fa-whatsapp"></i>
</a>

<a href="https://www.facebook.com/people/Rinc%C3%B3n-De-Papel/pfbid0kRFgBm41ALghwQPPoMnttDJ6B1yLGtTg6cP5PQKCCkfoGWiqaTGWhFQskLmWzTxql/?rdid=OZuHdLCDkyIqivNY&share_url=https%3A%2F%2Fwww.facebook.com%2Fshare%2F1AwXXoDEQQ%2F" target="_blank" class="fb">
<i class="fab fa-facebook-f"></i>
</a>

<a href="https://www.instagram.com/rincondepapel_ok?igsh=MXF4cnU4OGQ0OGc5OA%3D%3D" target="_blank" class="ig">
<i class="fab fa-instagram"></i>
</a>

<a href="#" onclick="scrollTopSmooth()" class="top">
<i class="fas fa-arrow-up"></i>
</a>

</div>

<div class="modal" id="modal" onclick="cerrarImagen()">
<img id="imgGrande">
</div>

<script>

let carrito={}

/* PRODUCTOS */

fetch("productos.xlsx")
.then(res=>res.arrayBuffer())
.then(data=>{

let wb=XLSX.read(data)
let hoja=wb.Sheets[wb.SheetNames[0]]
let productos=XLSX.utils.sheet_to_json(hoja)

let cont=document.getElementById("productos")

productos.forEach((p,i)=>{

let imgs=p.imagen.split(",")

let galeria=imgs.map(img=>`
<img src="${img.trim()}" onclick="verImagen('${img.trim()}')">
`).join("")

let dots=imgs.map((_,d)=>`<span class="${d==0?'activo':''}"></span>`).join("")

cont.innerHTML+=`

<div class="card">

<div class="galeriaWrap">

<div class="galeria" onscroll="actualizarDots(this, ${i})">
${galeria}
</div>

<div class="indicadores" id="dots${i}">
${dots}
</div>

</div>
<div class="swipeIcon">↔</div>

<h3>${p.nombre}</h3>
<p>$${p.precio}</p>

<div class="qty">
<button onclick="menos(${i})">-</button>
<input id="q${i}" value="1">
<button onclick="mas(${i})">+</button>
</div>

<button class="add" onclick="agregar('${p.nombre}',${p.precio},${i})">
Agregar
</button>

</div>

`

})

})

function actualizarDots(galeria,i){

let index=Math.round(galeria.scrollLeft/galeria.clientWidth)

let dots=document.querySelectorAll(`#dots${i} span`)

dots.forEach(d=>d.classList.remove("activo"))

if(dots[index]) dots[index].classList.add("activo")

}

function verImagen(src){
document.getElementById("modal").style.display="flex"
document.getElementById("imgGrande").src=src
}

function cerrarImagen(){
document.getElementById("modal").style.display="none"
}

function mas(i){
let q=document.getElementById("q"+i)
q.value=parseInt(q.value)+1
}

function menos(i){
let q=document.getElementById("q"+i)
if(q.value>1) q.value=parseInt(q.value)-1
}

function agregar(nombre,precio,i){

let valor = document.getElementById("q"+i).value

let cantidad = parseInt(valor)

if(isNaN(cantidad) || cantidad <= 0){
cantidad = 1
}

if(carrito[nombre]){
carrito[nombre].cantidad += cantidad
}else{
carrito[nombre] = {precio:precio, cantidad:cantidad}
}

actualizar()
}

function actualizar(){

let lista=document.getElementById("lista")
let datos=document.getElementById("datosCliente")

lista.innerHTML=""

let total=0
let dinero=0

for(let p in carrito){

let item=carrito[p]

lista.innerHTML+=`<li>${p} x${item.cantidad} = $${item.cantidad*item.precio}</li>`

total+=item.cantidad
dinero+=item.cantidad*item.precio

}

let nombre=document.getElementById("nombre").value
let apellido=document.getElementById("apellido").value
let fecha=document.getElementById("fecha").value
let direccion=document.getElementById("direccion").value
let tematica=document.getElementById("tematica").value

datos.innerHTML=`
<p><b>Cliente:</b> ${nombre} ${apellido}</p>
<p><b>Fecha del evento:</b> ${fecha}</p>
<p><b>Temática:</b> ${tematica}</p>
<p><b>Dirección:</b> ${direccion}</p>
`

document.getElementById("contador").innerText=total
document.getElementById("total").innerText="Total: $"+dinero

}

function abrirCarrito(){
actualizar()
document.getElementById("carrito").classList.add("activo")
}

function cerrarCarrito(){
document.getElementById("carrito").classList.remove("activo")
}

function cambiarEntrega(){

let tipo=document.getElementById("entrega").value

if(tipo=="Retiro"){
document.getElementById("direccion").style.display="none"
document.getElementById("retiroLink").style.display="block"
}else{
document.getElementById("direccion").style.display="block"
document.getElementById("retiroLink").style.display="none"
}
}

function enviarWhats(){

let nombre=document.getElementById("nombre").value
let apellido=document.getElementById("apellido").value
let fecha=document.getElementById("fecha").value
let direccion=document.getElementById("direccion").value
let entrega=document.getElementById("entrega").value
let tematica=document.getElementById("tematica").value

let totalTexto=document.getElementById("total").innerText

let texto="🎉✨ *NUEVO PEDIDO* ✨🎉\n"
texto+="════════════════════\n\n"

/* CLIENTE */

texto+="👤 *DATOS DEL CLIENTE*\n"
texto+="📝 Nombre: "+nombre+" "+apellido+"\n"
texto+="📅 Fecha del evento: "+fecha+"\n"
texto+="🎨 Temática: "+tematica+"\n\n"

/* ENTREGA */

texto+="📦🚚 *ENTREGA*\n"

if(entrega=="Retiro"){
texto+="📍 Tipo: Retiro en domicilio\n"
texto+="🗺️ Ubicación: https://maps.app.goo.gl/wgjL3WFK9cv3dm3N9?g_st=ac\n\n"
}else{
texto+="🚚 Tipo: Envío\n"
texto+="🏠 Dirección: "+direccion+"\n\n"
}

/* PRODUCTOS */

texto+="🛒🎁 *DETALLE DEL PEDIDO*\n"

for(let p in carrito){
let item=carrito[p]
texto+="🔹 "+p+"\n"
texto+="   ➤ Cantidad: "+item.cantidad+"\n"
}

/* TOTAL */

texto+="\n════════════════════\n"
texto+="💰💵 *"+totalTexto+"*\n"
texto+="════════════════════\n\n"

/* FINAL */

texto+="🙏✨ ¡Gracias por tu pedido!\n"
texto+="📲 Te contactaremos a la brevedad\n"
texto+="💖 ¡Que tengas un hermoso evento!"

window.open("https://wa.me/5493815441312?text="+encodeURIComponent(texto))

}

</script>

</body>
</html>
