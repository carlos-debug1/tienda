<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tienda de Tarjetas</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:url("fondo.jpg") top center/cover no-repeat fixed;
}

/* CONTENEDOR */

.main{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

/* PRODUCTOS */

.container{

display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;

}

.card{

width:280px;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 6px 15px rgba(0,0,0,0.2);

}

.card img{

width:100%;
height:200px;
object-fit:cover;
cursor:pointer;

}

.card h3{

margin:10px;

}

.card p{

margin:10px;
font-weight:600;

}

.card button{

margin:10px;
padding:10px 16px;
border:none;
background:#25D366;
color:white;
border-radius:20px;
cursor:pointer;

}

/* FORMULARIO CLIENTE */

.formulario{

margin-top:60px;
max-width:400px;
margin-left:auto;
margin-right:auto;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
padding:20px;
border-radius:12px;
color:white;
text-align:center;

}

.formulario input,
.formulario select{

width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
font-family:'Poppins';

}

/* BOTON CARRITO */

.botonCarrito{

position:fixed;
right:20px;
bottom:20px;
background:#25D366;
color:white;
border:none;
padding:14px 20px;
border-radius:30px;
cursor:pointer;

}

/* PANEL CARRITO */

.carritoPanel{

position:fixed;
right:-400px;
top:0;
width:350px;
height:100%;
background:white;
box-shadow:-4px 0 15px rgba(0,0,0,0.3);
padding:20px;
transition:.4s;

}

.carritoPanel.activo{
right:0;
}

/* ZOOM IMAGEN */

.modal{

display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;

}

.modal img{
max-width:90%;
}

</style>

</head>

<body>

<div class="main">

<!-- PRODUCTOS -->

<div class="container" id="productos"></div>

<!-- DATOS CLIENTE -->

<div class="formulario">

<h3>Datos del cliente</h3>

<input id="nombre" placeholder="Nombre">

<input id="apellido" placeholder="Apellido">

<label>Fecha evento</label>

<input type="date" id="fecha">

<select id="entrega" onchange="cambiarEntrega()">

<option value="">Forma de entrega</option>
<option value="Retiro">Retiro</option>
<option value="Envio">Envío</option>

</select>

<input id="direccionEnvio" placeholder="Dirección de envío">

<div id="retiroLink" style="display:none;margin-top:10px">

<a href="https://maps.app.goo.gl/hrkTuMXUugitd4rM6" target="_blank">

Ver dirección de retiro

</a>

</div>

</div>

</div>

<button class="botonCarrito" onclick="abrirCarrito()">

🛒 Carrito <span id="contador">0</span>

</button>

<div class="carritoPanel" id="carrito">

<button onclick="cerrarCarrito()">Cerrar</button>

<h2>Carrito</h2>

<ul id="lista"></ul>

<button onclick="enviarWhats()">Enviar pedido</button>

</div>

<div class="modal" id="modal" onclick="cerrarImagen()">

<img id="imgGrande">

</div>

<script>

/* PRODUCTOS DESDE EXCEL */

let carrito=[]

fetch("productos.xlsx")

.then(res=>res.arrayBuffer())

.then(data=>{

let workbook=XLSX.read(data)

let hoja=workbook.Sheets[workbook.SheetNames[0]]

let productos=XLSX.utils.sheet_to_json(hoja)

let cont=document.getElementById("productos")

productos.forEach(p=>{

cont.innerHTML+=`

<div class="card">

<img src="${p.imagen}" onclick="verImagen('${p.imagen}')">

<h3>${p.nombre}</h3>

<p>$${p.precio}</p>

<button onclick="agregar('${p.nombre} - $${p.precio}')">

Agregar

</button>

</div>

`

})

})

/* CARRITO */

function agregar(prod){

carrito.push(prod)

let lista=document.getElementById("lista")

lista.innerHTML=""

carrito.forEach(p=>{

lista.innerHTML+="<li>"+p+"</li>"

})

document.getElementById("contador").innerText=carrito.length

}

function abrirCarrito(){

document.getElementById("carrito").classList.add("activo")

}

function cerrarCarrito(){

document.getElementById("carrito").classList.remove("activo")

}

/* ENTREGA */

function cambiarEntrega(){

let tipo=document.getElementById("entrega").value

if(tipo=="Retiro"){

document.getElementById("direccionEnvio").style.display="none"

document.getElementById("retiroLink").style.display="block"

}

if(tipo=="Envio"){

document.getElementById("direccionEnvio").style.display="block"

document.getElementById("retiroLink").style.display="none"

}

}

/* WHATSAPP */

function enviarWhats(){

let nombre=document.getElementById("nombre").value

let apellido=document.getElementById("apellido").value

let fecha=document.getElementById("fecha").value

let entrega=document.getElementById("entrega").value

let direccion=document.getElementById("direccionEnvio").value

let texto="Cliente: "+nombre+" "+apellido+"\n"

texto+="Fecha evento: "+fecha+"\n"

texto+="Entrega: "+entrega+"\n"

if(entrega=="Envio"){

texto+="Direccion: "+direccion+"\n"

}

texto+="\nProductos:\n"

carrito.forEach(p=>{

texto+=p+"\n"

})

let url="https://wa.me/5493815441312?text="+encodeURIComponent(texto)

window.open(url)

}

/* ZOOM */

function verImagen(src){

document.getElementById("modal").style.display="flex"

document.getElementById("imgGrande").src=src

}

function cerrarImagen(){

document.getElementById("modal").style.display="none"

}

</script>

</body>
</html>
