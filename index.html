<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tienda de Tarjetas</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;

/* FONDO FIJO */

background:url("fondo.jpg") center top / cover no-repeat fixed;
}

/* CONTENEDOR */

.main{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

/* PRODUCTOS */

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
}

.card{
width:280px;
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 6px 15px rgba(0,0,0,0.25);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
cursor:pointer;
}

.card h3{
margin:10px;
}

.card p{
margin:10px;
font-weight:600;
}

/* CONTROLES CANTIDAD */

.qty{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
margin-bottom:10px;
}

.qty button{
padding:6px 12px;
border:none;
background:black;
color:white;
border-radius:5px;
cursor:pointer;
}

.qty input{
width:50px;
text-align:center;
border:1px solid #ccc;
border-radius:4px;
}

/* BOTON AGREGAR */

.card button.add{
margin:10px;
padding:10px 16px;
border:none;
background:black;
color:white;
border-radius:25px;
cursor:pointer;
width:90%;
}

/* FORMULARIO CLIENTE */

.formulario{
margin-top:60px;
max-width:420px;
margin-left:auto;
margin-right:auto;
background:rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
padding:25px;
border-radius:14px;
color:black;
text-align:center;
}

.formulario input,
.formulario select{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
font-family:'Poppins';
}

/* BOTON CARRITO */

.botonCarrito{
position:fixed;
right:20px;
bottom:20px;
background:black;
color:white;
border:none;
padding:14px 22px;
border-radius:30px;
cursor:pointer;
font-size:16px;
}

/* PANEL CARRITO */

.carritoPanel{
position:fixed;
right:-400px;
top:0;
width:350px;
height:100%;
background:white;
box-shadow:-4px 0 15px rgba(0,0,0,0.3);
padding:20px;
transition:.4s;
overflow:auto;
}

.carritoPanel.activo{
right:0;
}

.carritoPanel h2{
margin-top:0;
}

.total{
font-weight:bold;
margin-top:20px;
font-size:18px;
}

/* ZOOM */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}

.modal img{
max-width:90%;
}

</style>

</head>

<body>

<div class="main">

<div class="container" id="productos"></div>

<!-- FORMULARIO CLIENTE -->

<div class="formulario">

<h3>Datos del cliente</h3>

<input id="nombre" placeholder="Nombre">

<input id="apellido" placeholder="Apellido">

<label>Fecha evento</label>

<input type="date" id="fecha">

<select id="entrega" onchange="cambiarEntrega()">

<option value="">Forma de entrega</option>
<option value="Retiro">Retiro</option>
<option value="Envio">Envío</option>

</select>

<input id="direccionEnvio" placeholder="Dirección de envío">

<div id="retiroLink" style="display:none;margin-top:10px">

<a href="https://maps.app.goo.gl/hrkTuMXUugitd4rM6" target="_blank">

Ver dirección de retiro

</a>

</div>

</div>

</div>

<button class="botonCarrito" onclick="abrirCarrito()">

🛒 Carrito <span id="contador">0</span>

</button>

<div class="carritoPanel" id="carrito">

<button onclick="cerrarCarrito()">Cerrar</button>

<h2>Resumen del pedido</h2>

<ul id="lista"></ul>

<div class="total" id="total"></div>

<button onclick="enviarWhats()">Enviar pedido</button>

</div>

<div class="modal" id="modal" onclick="cerrarImagen()">
<img id="imgGrande">
</div>

<script>

let carrito={}

/* CARGAR PRODUCTOS DESDE EXCEL */

fetch("productos.xlsx")
.then(res=>res.arrayBuffer())
.then(data=>{

let workbook=XLSX.read(data)
let hoja=workbook.Sheets[workbook.SheetNames[0]]
let productos=XLSX.utils.sheet_to_json(hoja)

let cont=document.getElementById("productos")

productos.forEach((p,i)=>{

cont.innerHTML+=`

<div class="card">

<img src="${p.imagen}" onclick="verImagen('${p.imagen}')">

<h3>${p.nombre}</h3>

<p>$${p.precio}</p>

<div class="qty">

<button onclick="menos(${i})">-</button>

<input id="q${i}" value="1">

<button onclick="mas(${i})">+</button>

</div>

<button class="add" onclick="agregar('${p.nombre}',${p.precio},${i})">

Agregar

</button>

</div>

`

})

})

function mas(i){
let q=document.getElementById("q"+i)
q.value=parseInt(q.value)+1
}

function menos(i){
let q=document.getElementById("q"+i)
if(q.value>1) q.value=parseInt(q.value)-1
}

/* AGREGAR AL CARRITO */

function agregar(nombre,precio,i){

let cantidad=parseInt(document.getElementById("q"+i).value)

if(carrito[nombre]){

carrito[nombre].cantidad+=cantidad

}else{

carrito[nombre]={precio:precio,cantidad:cantidad}

}

actualizarCarrito()

}

function actualizarCarrito(){

let lista=document.getElementById("lista")
lista.innerHTML=""

let total=0
let dinero=0

for(let p in carrito){

let item=carrito[p]

lista.innerHTML+=`<li>${p} x${item.cantidad} = $${item.cantidad*item.precio}</li>`

total+=item.cantidad
dinero+=item.cantidad*item.precio

}

document.getElementById("contador").innerText=total
document.getElementById("total").innerText="Total: $"+dinero

}

/* CARRITO */

function abrirCarrito(){
document.getElementById("carrito").classList.add("activo")
}

function cerrarCarrito(){
document.getElementById("carrito").classList.remove("activo")
}

/* ENTREGA */

function cambiarEntrega(){

let tipo=document.getElementById("entrega").value

if(tipo=="Retiro"){

document.getElementById("direccionEnvio").style.display="none"
document.getElementById("retiroLink").style.display="block"

}

if(tipo=="Envio"){

document.getElementById("direccionEnvio").style.display="block"
document.getElementById("retiroLink").style.display="none"

}

}

/* WHATSAPP */

function enviarWhats(){

let nombre=document.getElementById("nombre").value
let apellido=document.getElementById("apellido").value
let fecha=document.getElementById("fecha").value
let entrega=document.getElementById("entrega").value
let direccion=document.getElementById("direccionEnvio").value

let texto="Cliente: "+nombre+" "+apellido+"\n"
texto+="Fecha evento: "+fecha+"\n"
texto+="Entrega: "+entrega+"\n"

if(entrega=="Envio") texto+="Direccion: "+direccion+"\n"

texto+="\nProductos:\n"

for(let p in carrito){

texto+=p+" x"+carrito[p].cantidad+"\n"

}

let url="https://wa.me/5493815441312?text="+encodeURIComponent(texto)

window.open(url)

}

/* ZOOM IMAGEN */

function verImagen(src){

document.getElementById("modal").style.display="flex"
document.getElementById("imgGrande").src=src

}

function cerrarImagen(){

document.getElementById("modal").style.display="none"

}

</script>

</body>
</html>
