<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tienda de Tarjetas</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

/* PORTADA */

.portada{

height:350px;
background-image:url("fondo.jpg");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:40px;
font-weight:bold;
text-shadow:2px 2px 10px black;

}

/* BUSCADOR */

#buscador{

width:80%;
max-width:400px;
display:block;
margin:30px auto;
padding:12px;
font-size:16px;
border-radius:5px;
border:1px solid #ccc;

}

/* PRODUCTOS */

.container{

display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
padding:20px;

}

.producto{

background:white;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;

}

.producto img{

width:100%;
border-radius:8px;

}

button{

background:#25D366;
color:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
margin-top:10px;

}

input{

width:60px;
padding:5px;

}

/* BOTON CARRITO */

#botonCarrito{

position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
border:none;
padding:15px 20px;
border-radius:50px;
font-size:18px;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.3);

}

/* CONTADOR */

#contador{

background:red;
color:white;
border-radius:50%;
padding:4px 8px;
font-size:12px;
margin-left:5px;

}

/* PANEL CARRITO */

#carrito{

position:fixed;
right:-320px;
top:0;
width:300px;
height:100%;
background:white;
box-shadow:-3px 0 10px rgba(0,0,0,0.2);
padding:20px;
overflow:auto;
transition:0.3s;

}

#cerrar{

background:red;
margin-bottom:10px;

}

.eliminar{

background:red;
margin-left:10px;

}

</style>

</head>

<body>

<!-- PORTADA -->

<div class="portada"></div>

<input type="text" id="buscador" placeholder="Buscar tarjeta...">

<div class="container" id="productos"></div>

<!-- BOTON CARRITO -->

<button id="botonCarrito" onclick="toggleCarrito()">

🛒 Carrito <span id="contador">0</span>

</button>

<!-- PANEL CARRITO -->

<div id="carrito">

<button id="cerrar" onclick="toggleCarrito()">Cerrar</button>

<h2>Carrito</h2>

<ul id="listaCarrito"></ul>

<button onclick="enviarPedido()">Enviar pedido</button>

</div>

<script>

const telefono="5493813019415"

let carrito=[]

const productos=[

{nombre:"Tarjeta Globos",imagen:"https://via.placeholder.com/200"},
{nombre:"Tarjeta Torta",imagen:"https://via.placeholder.com/200"},
{nombre:"Tarjeta Infantil",imagen:"https://via.placeholder.com/200"},
{nombre:"Tarjeta Flores",imagen:"https://via.placeholder.com/200"},
{nombre:"Tarjeta Cumple Feliz",imagen:"https://via.placeholder.com/200"}

]

function mostrarProductos(lista){

const contenedor=document.getElementById("productos")

contenedor.innerHTML=""

lista.forEach((p,i)=>{

contenedor.innerHTML+=`

<div class="producto">

<img src="${p.imagen}">

<h3>${p.nombre}</h3>

<input type="number" id="cant${i}" value="1" min="1">

<br>

<button onclick="agregar(${i})">Agregar</button>

</div>

`

})

}

mostrarProductos(productos)

function agregar(i){

let cantidad=document.getElementById("cant"+i).value

carrito.push({

nombre:productos[i].nombre,
cantidad:cantidad

})

actualizarCarrito()

}

function actualizarCarrito(){

let lista=document.getElementById("listaCarrito")

lista.innerHTML=""

carrito.forEach((p,i)=>{

lista.innerHTML+=`

<li>${p.nombre} x${p.cantidad}

<button class="eliminar" onclick="eliminar(${i})">X</button>

</li>

`

})

document.getElementById("contador").innerText=carrito.length

}

function eliminar(i){

carrito.splice(i,1)

actualizarCarrito()

}

let abierto=false

function toggleCarrito(){

let panel=document.getElementById("carrito")

if(abierto){

panel.style.right="-320px"
abierto=false

}else{

panel.style.right="0"
abierto=true

}

}

function enviarPedido(){

let mensaje="Hola, quiero hacer este pedido:%0A%0A"

carrito.forEach(p=>{

mensaje+=`${p.nombre} x${p.cantidad}%0A`

})

let url=`https://wa.me/${telefono}?text=${mensaje}`

window.open(url)

}

document.getElementById("buscador").addEventListener("keyup",function(){

let texto=this.value.toLowerCase()

let filtrados=productos.filter(p=>p.nombre.toLowerCase().includes(texto))

mostrarProductos(filtrados)

})

</script>

</body>

</html>
