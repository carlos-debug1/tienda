<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tienda PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:url("fondo.jpg") center/cover fixed;
}

.main{
max-width:1100px;
margin:auto;
padding:40px;
margin-top:20vh;
}

/* PRODUCTOS */

.container{
display:flex;
flex-wrap:wrap;
gap:25px;
justify-content:center;
}

.card{
width:280px;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* GALERIA */

.galeria{
display:flex;
overflow-x:auto;
scroll-snap-type:x mandatory;
}

.galeria img{
width:100%;
height:200px;
object-fit:cover;
flex-shrink:0;
scroll-snap-align:center;
}

/* CANTIDAD */

.qty{
display:flex;
justify-content:center;
gap:10px;
margin:10px;
}

.qty button{
background:black;
color:white;
border:none;
padding:6px 12px;
}

.qty input{
width:50px;
text-align:center;
}

/* BOTON */

.add{
background:black;
color:white;
border:none;
padding:10px;
width:90%;
margin:10px;
}

/* FORMULARIO */

.formulario{
margin-top:60px;
max-width:400px;
margin:auto;
background:rgba(255,255,255,0.2);
padding:20px;
border-radius:10px;
color:white;
}

/* CARRITO */

.carritoPanel{
position:fixed;
right:-400px;
top:0;
width:350px;
height:100%;
background:white;
padding:20px;
transition:.4s;
overflow:auto;
}

.carritoPanel.activo{
right:0;
}

.botonCarrito{
position:fixed;
bottom:20px;
right:20px;
background:black;
color:white;
padding:15px;
border:none;
border-radius:30px;
}

</style>

</head>

<body>

<div class="main">

<div class="container" id="productos"></div>

<div class="formulario">

<h3>Datos del cliente</h3>

<input id="nombre" placeholder="Nombre"><br>
<input id="apellido" placeholder="Apellido"><br>

<label>Fecha del evento</label><br>
<input type="date" id="fecha"><br>

<select id="entrega">
<option value="">Entrega</option>
<option value="Retiro">Retiro</option>
<option value="Envio">Envío</option>
</select><br>

<input id="direccion" placeholder="Dirección">

</div>

</div>

<button class="botonCarrito" onclick="abrirCarrito()">
🛒 <span id="contador">0</span>
</button>

<div class="carritoPanel" id="carrito">

<button onclick="cerrarCarrito()">Cerrar</button>

<h2>Resumen</h2>

<div id="datosCliente"></div>

<ul id="lista"></ul>

<div id="total"></div>

<button onclick="enviarWhats()">Enviar pedido</button>

</div>

<script>

let carrito={}

/* PRODUCTOS DESDE EXCEL */

fetch("productos.xlsx")
.then(res=>res.arrayBuffer())
.then(data=>{

let wb=XLSX.read(data)
let hoja=wb.Sheets[wb.SheetNames[0]]
let productos=XLSX.utils.sheet_to_json(hoja)

let cont=document.getElementById("productos")

productos.forEach((p,i)=>{

let imgs=p.imagen.split(",")

let galeria=imgs.map(img=>`<img src="${img.trim()}">`).join("")

cont.innerHTML+=`

<div class="card">

<div class="galeria">
${galeria}
</div>

<h3>${p.nombre}</h3>
<p>$${p.precio}</p>

<div class="qty">
<button onclick="menos(${i})">-</button>
<input id="q${i}" value="1">
<button onclick="mas(${i})">+</button>
</div>

<button class="add" onclick="agregar('${p.nombre}',${p.precio},${i})">
Agregar
</button>

</div>

`

})

})

function mas(i){
let q=document.getElementById("q"+i)
q.value=parseInt(q.value)+1
}

function menos(i){
let q=document.getElementById("q"+i)
if(q.value>1) q.value=parseInt(q.value)-1
}

/* CARRITO */

function agregar(nombre,precio,i){

let cantidad=parseInt(document.getElementById("q"+i).value)

if(carrito[nombre]){
carrito[nombre].cantidad+=cantidad
}else{
carrito[nombre]={precio:precio,cantidad:cantidad}
}

actualizar()
}

function actualizar(){

let lista=document.getElementById("lista")
let datos=document.getElementById("datosCliente")

lista.innerHTML=""

let total=0
let dinero=0

for(let p in carrito){

let item=carrito[p]

lista.innerHTML+=`<li>${p} x${item.cantidad} = $${item.cantidad*item.precio}</li>`

total+=item.cantidad
dinero+=item.cantidad*item.precio

}

/* DATOS CLIENTE */

let nombre=document.getElementById("nombre").value
let apellido=document.getElementById("apellido").value
let fecha=document.getElementById("fecha").value
let direccion=document.getElementById("direccion").value

datos.innerHTML=`
<p><b>Cliente:</b> ${nombre} ${apellido}</p>
<p><b>Fecha del evento:</b> ${fecha}</p>
<p><b>Dirección:</b> ${direccion}</p>
`

document.getElementById("contador").innerText=total
document.getElementById("total").innerText="Total: $"+dinero

}

function abrirCarrito(){
actualizar()
document.getElementById("carrito").classList.add("activo")
}

function cerrarCarrito(){
document.getElementById("carrito").classList.remove("activo")
}

/* WHATSAPP */

function enviarWhats(){

let nombre=document.getElementById("nombre").value
let apellido=document.getElementById("apellido").value
let fecha=document.getElementById("fecha").value
let direccion=document.getElementById("direccion").value

let texto="PEDIDO\n\n"

texto+="Cliente: "+nombre+" "+apellido+"\n"
texto+="Fecha del evento: "+fecha+"\n"
texto+="Dirección: "+direccion+"\n\n"

texto+="Productos:\n"

for(let p in carrito){
texto+=p+" x"+carrito[p].cantidad+"\n"
}

texto+="\nTotal: $"+document.getElementById("total").innerText.replace("Total: $","")

window.open("https://wa.me/5493815441312?text="+encodeURIComponent(texto))

}

</script>

</body>
</html>
