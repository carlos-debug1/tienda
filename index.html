<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* FOTO DE PORTADA */

.hero{
height:350px;
background:url("fondo.jpg");
background-size:cover;
background-position:center;
}

/* PRODUCTOS */

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
}

.card{
background:white;
width:220px;
margin:10px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
text-align:center;
padding:10px;
}

.card img{
width:100%;
border-radius:10px;
}

.card button{
background:#25D366;
color:white;
border:none;
padding:10px;
margin-top:10px;
border-radius:5px;
cursor:pointer;
}

/* FORMULARIO */

.formulario{
background:white;
max-width:500px;
margin:30px auto;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.formulario input,
.formulario select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
border:1px solid #ccc;
}

/* BOTON CARRITO */

.botonCarrito{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
border:none;
padding:15px;
border-radius:50px;
font-size:16px;
cursor:pointer;
}

/* PANEL CARRITO */

.carritoPanel{
position:fixed;
right:-350px;
top:0;
width:350px;
height:100%;
background:white;
box-shadow:-3px 0 10px rgba(0,0,0,0.2);
padding:20px;
transition:0.4s;
overflow:auto;
}

.carritoPanel.activo{
right:0;
}

.cerrar{
font-size:20px;
cursor:pointer;
float:right;
}

/* RESUMEN */

.resumen{
background:white;
max-width:600px;
margin:30px auto;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
display:none;
}

.resumen button{
background:#25D366;
color:white;
border:none;
padding:12px;
margin-top:10px;
border-radius:5px;
cursor:pointer;
width:100%;
}

</style>
</head>

<body>

<div class="hero"></div>

<!-- PRODUCTOS -->

<div class="container">

<div class="card">
<img src="producto1.jpg">
<h3>Tarjeta 1</h3>
<button onclick="agregar('Tarjeta 1')">Agregar</button>
</div>

<div class="card">
<img src="producto2.jpg">
<h3>Tarjeta 2</h3>
<button onclick="agregar('Tarjeta 2')">Agregar</button>
</div>

<div class="card">
<img src="producto3.jpg">
<h3>Tarjeta 3</h3>
<button onclick="agregar('Tarjeta 3')">Agregar</button>
</div>

</div>

<!-- FORMULARIO -->

<div class="formulario">

<input type="text" id="nombre" placeholder="Nombre">

<input type="text" id="apellido" placeholder="Apellido">

<label>Fecha de evento</label>
<input type="date" id="fecha">

<select id="entrega" onchange="direccionMostrar()">
<option value="">Forma de entrega</option>
<option>Retiro en local</option>
<option>Envío a domicilio</option>
</select>

<div id="direccionBox" style="display:none">
<input type="text" id="direccion" placeholder="Dirección">
</div>

</div>

<!-- BOTON CARRITO -->

<button class="botonCarrito" onclick="abrirCarrito()">
🛒 Carrito
</button>

<!-- PANEL CARRITO -->

<div class="carritoPanel" id="carrito">

<span class="cerrar" onclick="cerrarCarrito()">✖</span>

<h2>Carrito</h2>

<ul id="lista"></ul>

<button onclick="verResumen()">Ver resumen</button>

</div>

<!-- RESUMEN -->

<div class="resumen" id="resumen">

<h2>Resumen del pedido</h2>

<div id="datos"></div>

<button onclick="enviarWhats()">Enviar pedido por WhatsApp</button>

</div>

<script>

let carrito=[]

function agregar(producto){

carrito.push(producto)

let lista=document.getElementById("lista")

let li=document.createElement("li")

li.textContent=producto

lista.appendChild(li)

}

function abrirCarrito(){
document.getElementById("carrito").classList.add("activo")
}

function cerrarCarrito(){
document.getElementById("carrito").classList.remove("activo")
}

function direccionMostrar(){

let entrega=document.getElementById("entrega").value

if(entrega=="Envío a domicilio"){
document.getElementById("direccionBox").style.display="block"
}else{
document.getElementById("direccionBox").style.display="none"
}

}

function verResumen(){

let nombre=document.getElementById("nombre").value
let apellido=document.getElementById("apellido").value
let fecha=document.getElementById("fecha").value
let entrega=document.getElementById("entrega").value
let direccion=document.getElementById("direccion").value

let productos=carrito.join(", ")

let texto=
`
<b>Cliente:</b> ${nombre} ${apellido}<br>
<b>Fecha evento:</b> ${fecha}<br>
<b>Entrega:</b> ${entrega}<br>
<b>Dirección:</b> ${direccion}<br><br>
<b>Productos:</b><br>${productos}
`

document.getElementById("datos").innerHTML=texto

document.getElementById("resumen").style.display="block"

cerrarCarrito()

}

function enviarWhats(){

let datos=document.getElementById("datos").innerText

let url="https://wa.me/5493815441312?text="+encodeURIComponent(datos)

window.open(url)

}

</script>

</body>
</html>
